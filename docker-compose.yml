version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-1234}
      POSTGRES_DB: ${DB_NAME:-local_data_validator}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8050:8050"
    depends_on:
      - db
    env_file:
      - .env

volumes:
  postgres_data: